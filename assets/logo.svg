<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="head-clip"><circle cx="340" cy="185" r="71"/></clipPath>
  </defs>
  <!-- Handle: ink outline, oak shaft, grain, darker leather grip with wraps -->
  <line x1="176" y1="350" x2="292" y2="233" stroke="#2E2A33" stroke-width="52" stroke-linecap="round"/>
  <line x1="176" y1="350" x2="292" y2="233" stroke="#8A5A33" stroke-width="34" stroke-linecap="round"/>
  <line x1="230" y1="302" x2="274" y2="258" stroke="#6B4223" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="220" y1="292" x2="262" y2="250" stroke="#6B4223" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="176" y1="350" x2="216" y2="310" stroke="#6B4223" stroke-width="34" stroke-linecap="round"/>
  <line x1="183" y1="325" x2="201" y2="343" stroke="#4A2E18" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="197" y1="311" x2="215" y2="329" stroke="#4A2E18" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Socket collar joining shaft to head -->
  <g transform="translate(286 239) rotate(-45)">
    <rect x="-28" y="-21" width="56" height="42" rx="7" fill="#7C8899" stroke="#2E2A33" stroke-width="9"/>
  </g>
  <!-- Spikes: 7 around the head, none where the shaft enters -->
  <g transform="translate(340 185)" fill="#8E9BAD" stroke="#2E2A33" stroke-width="9" stroke-linejoin="round">
    <polygon points="0,-148 -24,-66 24,-66"/>
    <polygon points="0,-148 -24,-66 24,-66" transform="rotate(45)"/>
    <polygon points="0,-148 -24,-66 24,-66" transform="rotate(90)"/>
    <polygon points="0,-148 -24,-66 24,-66" transform="rotate(135)"/>
    <polygon points="0,-148 -24,-66 24,-66" transform="rotate(180)"/>
    <polygon points="0,-148 -24,-66 24,-66" transform="rotate(270)"/>
    <polygon points="0,-148 -24,-66 24,-66" transform="rotate(315)"/>
  </g>
  <!-- Head: shaded base, offset lit circle clipped to the head, specular glints -->
  <circle cx="340" cy="185" r="76" fill="#7C8899" stroke="#2E2A33" stroke-width="10"/>
  <g clip-path="url(#head-clip)"><circle cx="327" cy="172" r="76" fill="#9BA7B8"/></g>
  <ellipse cx="308" cy="148" rx="19" ry="11" transform="rotate(-38 308 148)" fill="#DDE4EC"/>
  <circle cx="286" cy="170" r="6" fill="#DDE4EC"/>
</svg>
